<!DOCTYPE html>
<html>
<head>
<title>Elite Store</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:#131921;
    color:white;
}

.nav-links a {
    color:white;
    margin-left:15px;
    text-decoration:none;
}

/* SLIDER */
.slider {
    position:relative;
    height:350px;
    overflow:hidden;
}

.slide {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
}

.active {
    opacity:1;
}

/* BUTTON */
.btn {
    padding:10px 20px;
    background:#ff9900;
    border:none;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

/* FEATURES */
.features {
    padding:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.dark .card {
    background:#1e1e1e;
}

/* PRODUCTS */
.products {
    padding:30px;
}

.product-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.product {
    border:1px solid #ddd;
    padding:10px;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
}

.product img {
    width:100%;
    height:150px;
    object-fit:contain;
}

.tag {
    background:red;
    color:white;
    padding:2px 6px;
    font-size:12px;
    border-radius:4px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🛒 Elite Store</h2>

    <div class="nav-links">
        <a href="/products.html">Shop</a>
        <a href="/cart.html">Cart 🛒 (<span id="cartCount">0</span>)</a>
        <a href="/wishlist.html">Wishlist ❤️ (<span id="wishCount">0</span>)</a>
        <a href="/orders.html">Orders 📦</a>
        <a href="/login.html">Login</a>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<!-- SLIDER -->
<div class="slider">
    <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da" class="slide active">
    <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796" class="slide">
    <img src="https://images.unsplash.com/photo-1511385348-a52b4a160dc2" class="slide">
</div>

<!-- FEATURES -->
<div class="features">
    <div class="card">📦 Quality Products</div>
    <div class="card">🚀 Fast Delivery</div>
    <div class="card">🔒 Secure Payments</div>
    <div class="card">↩ Easy Returns</div>
</div>

<!-- PRODUCTS -->
<div class="products">
    <h2>🔥 Trending Products</h2>
    <div class="product-grid" id="products"></div>
</div>

<script>

/* SLIDER */
let index=0;
setInterval(()=>{
    let slides=document.querySelectorAll(".slide");
    slides[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
},3000);

/* LOAD PRODUCTS */
async function loadProducts(){
    const res = await fetch("/api/products");
    const data = await res.json();

    const div = document.getElementById("products");

    data.slice(0,6).forEach(p=>{
        div.innerHTML += `
        <div class="product" onclick="openProduct('${p._id}')">
            <span class="tag">🔥 Best Seller</span>
            <img src="/uploads/${p.image}">
            <h4>${p.name}</h4>
            <p>₹${p.price}</p>
        </div>`;
    });
}

function openProduct(id){
    window.location.href="/product.html?id="+id;
}

/* COUNTS */
async function loadCounts(){
    try{
        let c = await fetch("/api/cart-count",{credentials:"same-origin"});
        let cd = await c.json();
        document.getElementById("cartCount").innerText = cd.count || 0;

        let w = await fetch("/api/wishlist-count",{credentials:"same-origin"});
        let wd = await w.json();
        document.getElementById("wishCount").innerText = wd.count || 0;
    }catch{
        document.getElementById("cartCount").innerText=0;
        document.getElementById("wishCount").innerText=0;
    }
}

/* DARK MODE */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* INIT */
loadProducts();
loadCounts();

</script>

</body>
</html>
