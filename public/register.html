<!DOCTYPE html>
<html>
<head>
    <title>Register | Elite Store</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        a {
            text-decoration: none;
            color: #2563eb;
        }

        .link {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <form action="/register" method="POST">
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="link">
        <p>Already have an account?</p>
        <a href="/login.html">Login Here</a>
    </div>
</div>

</body>
</html>
