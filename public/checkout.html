<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    background:white;
    color:black;
    padding:25px;
    border-radius:10px;
    width:320px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>💳 Payment</h2>

    <input placeholder="Card Number">
    <input placeholder="Expiry Date">
    <input placeholder="CVV">

    <button onclick="pay()">Pay Now</button>
</div>

<script>

const token = localStorage.getItem("token");

async function pay(){

    alert("Processing Payment...");

    // fake delay
    setTimeout(async ()=>{

        const res = await fetch("/api/place-order",{
            method:"POST",
            headers:{ Authorization: token }
        });

        const data = await res.json();

        alert("✅ Payment Successful!");

        location.href="/orders.html";

    },2000);
}

</script>

</body>
</html>
